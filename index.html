<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro-Quiz</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="quiz-container">
      <div id="game-screen">
        <div class="header">
          <select id="subject-select" style="
            background: #334155;
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
          ">
            <option value="biology">Biology</option>
            <option value="chemistry" selected>Chemistry</option>
            <option value="physics">Physics</option>
            <option value="history">History</option>
            <option value="history2">History 2</option>
          </select>
          <span
            id="topic-tag"
            style="
              color: var(--primary);
              font-size: 0.8rem;
              text-transform: uppercase;
              letter-spacing: 1px;
            "
            >Chemistry X</span
          >
          <span id="q-count">1/76</span>
        </div>
        <div class="progress-container">
          <div id="progress-bar"></div>
        </div>

        <div id="question-text" class="question">Loading question...</div>

        <div id="options-container" class="options-grid"></div>

        <div class="jump-to-question">
          <input 
            type="number" 
            id="question-number-input" 
            min="1" 
            placeholder="Enter question number"
          />
          <button 
            class="btn-action" 
            onclick="jumpToQuestion()"
          >
            Jump to Question
          </button>
        </div>

        <div id="subjective-container" style="display: none">
          <button id="btn-reveal" class="btn-action" onclick="revealAnswer()">
            Reveal Expected Answer
          </button>
          <div id="subjective-answer" class="subjective-answer"></div>
          <div id="self-score-container" class="self-score-btns">
            <button class="btn-self-correct" onclick="selfScore(true)">
              I Got It Right (+1)
            </button>
            <button class="btn-self-wrong" onclick="selfScore(false)">
              I Got It Wrong (0)
            </button>
          </div>
        </div>
      </div>

      <div id="result-screen">
        <h2>Quiz Complete!</h2>
        <div class="score-circle" id="final-score">0/95</div>
        <p id="feedback-text">Keep practicing to master All Subjects!</p>
        <button class="btn-action" onclick="location.reload()">
          Restart Quiz
        </button>
      </div>
    </div>

    <script>

      const selectedSubject = sessionStorage.getItem('selectedSubject') || 'chemistry';
      document.getElementById('subject-select').value = selectedSubject;
      
      subjectNames = {
        biology: 'Biology X',
        chemistry: 'Chemistry X',
        physics: 'Physics X',
        history: 'History X',
        history2: 'History 2 X'
      };
      document.getElementById('topic-tag').innerText = subjectNames[selectedSubject];
      
      const subjectScript = document.createElement('script');
      subjectScript.src = selectedSubject + '.js';
      
      subjectScript.onload = function() {
        const appScript = document.createElement('script');
        appScript.src = 'app.js';
        document.body.appendChild(appScript);
      };
      
      document.head.appendChild(subjectScript);
    </script>

    <script>
      const subjectNames = {
        biology: 'Biology X',
        chemistry: 'Chemistry X',
        physics: 'Physics X',
        history: 'History X',
        history2: 'History 2 X'
      };
      
      document.getElementById('subject-select').addEventListener('change', function(e) {
        const selectedSubject = e.target.value;

        document.getElementById('topic-tag').innerText = subjectNames[selectedSubject];
        
        sessionStorage.setItem('selectedSubject', selectedSubject);
        location.reload();
      });
    </script>
  </body>
</html>
